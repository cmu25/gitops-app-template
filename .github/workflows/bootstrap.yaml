name: Bootstrap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Replace Placeholders
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          sed -i "s#{{APP_NAME}}#${REPO_NAME}#g" README.md
          sed -i "s#{{REPOSITORY}}#${{ github.repository }}#g" README.md

      - name: Testing Bootstrap Success
        run: |
          if grep "{{APP_NAME}}" README.md; then
            echo "Faulty Bootstrap — stopping workflow. Please restart workflow."
            exit 1
          fi
          if grep "{{REPOSITORY}}" README.md; then
            echo "Faulty Bootstrap — stopping workflow. Please restart workflow."
            exit 1
          fi

      - name: Remove bootstrap workflow
        run: |
          rm .github/workflows/bootstrap.yaml

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .github/workflows/bootstrap.yaml
          git add README.md
          git commit -m "Remove bootstrap workflow [skip ci]"
          git push
