name: Build-and-Push-Image

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
            ${{ github.event.repository.name }}-config

      - name: Configure Docker credentials
        run: |
          mkdir -p /home/runner/work/_temp/_github_home/.docker
          echo '{"auths":{"ghcr.io":{"auth":"'$(echo -n "${{ github.repository_owner }}:${{ steps.app-token.outputs.token }}" | base64)'"}}}' > /home/runner/work/_temp/_github_home/.docker/config.json

      - name: Build and Push Image with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:v1.23.2-debug
        env:
          DOCKER_CONFIG: /github/home/.docker
        with:
          args: >-
            --context=/github/workspace
            --dockerfile=/github/workspace/Dockerfile
            --destination=ghcr.io/${{ github.repository }}:${{ github.sha }}
            --destination=ghcr.io/${{ github.repository }}:latest

      - name: Trigger Config Repository
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}-config/dispatches \
            -d '{"event_type":"image-update"}'
