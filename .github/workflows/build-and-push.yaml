name: Build-and-Push-Image

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  get-token:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    steps:
      - name: Get GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

  build-and-push:
    needs: get-token
    if: github.event.before != '0000000000000000000000000000000000000000'
    runs-on: ubuntu-latest
    container:
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
    steps:
      - uses: actions/checkout@v4

      - name: Build and Push Image with Kaniko
        run: |
          /kaniko/executor \
            --context ${{ github.workspace }} \
            --dockerfile ${{ github.workspace }}/Dockerfile \
            --destination ghcr.io/${{ github.repository }}:${{ github.sha }} \
            --destination ghcr.io/${{ github.repository }}:latest \
            --registry-username=${{ github.repository_owner }} \
            --registry-password=${{ needs.get-token.outputs.token }}

      - name: Trigger Config Repository
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ needs.get-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}-config/dispatches \
            -d '{"event_type":"image-update"}'